*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4}

/* Header Styles */
.hdr{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;height:64px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.hdr-logo{font-size:20px;font-weight:700;letter-spacing:3px;color:#111;text-decoration:none}
.hdr-logo span{font-weight:400;color:#888}
.hdr-nav{display:flex;gap:2rem;align-items:center}
.hdr-link{font-size:13px;color:#666;cursor:pointer;letter-spacing:0.5px;text-decoration:none}
.hdr-link:hover,.hdr-link.active{color:#111;font-weight:600}
.hdr-actions{display:flex;gap:10px;align-items:center}
.cart-chip{display:flex;align-items:center;gap:6px;background:#f5f5f5;border:1px solid #e8e8e8;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;color:#111}
.cart-count{background:#111;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* Catalog Sidebar Layout */
.catalog-layout{display:grid;grid-template-columns:260px 1fr;max-width:1400px;margin:0 auto;padding:1rem 2rem;gap:2rem}

/* Product Navigation Sidebar */
.sidebar-nav{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.2rem;height:fit-content;position:sticky;top:84px}
.sidebar-title{font-size:12px;font-weight:700;letter-spacing:1px;color:#aaa;text-transform:uppercase;margin-bottom:10px;padding-left:6px}
.prod-menu-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.prod-menu-item{font-size:13.5px;color:#555;padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:between;transition:all 0.2s}
.prod-menu-item:hover{background:#f5f5f5;color:#111}
.prod-menu-item.active{background:#111;color:#fff;font-weight:600}

/* Main Display Layout */
.prod-container{display:grid;grid-template-columns:1.1fr 1fr;gap:2.5rem;background:transparent}

/* Left Column: Image Gallery */
.gallery-wrap{display:flex;flex-direction:column;gap:12px}
.main-img-box{width:100%;background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.main-img-box img{width:100%;height:100%;object-fit:cover;transition:opacity 0.2s ease}
.thumb-row{display:flex;gap:10px}
.thumb{width:70px;height:70px;border:1px solid #e8e8e8;border-radius:8px;cursor:pointer;overflow:hidden;background:#fff;transition:all 0.2s}
.thumb.active{border-color:#111;border-width:2px}
.thumb img{width:100%;height:100%;object-fit:cover}

/* Right Column: Product Information */
.details-box{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:2rem;display:flex;flex-direction:column;gap:1.2rem;height:fit-content}
.brand-tag{font-size:11px;letter-spacing:1px;color:#aaa;text-transform:uppercase}
.prod-title{font-size:26px;font-weight:700;color:#111;line-height:1.2}
.rating-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#666}
.stars{color:#ffb800;display:flex;gap:2px}
.price-tag{font-size:24px;font-weight:700;color:#111}

/* Selection Modifiers */
.selector-group{display:flex;flex-direction:column;gap:8px}
.selector-label{font-size:11px;font-weight:600;color:#666;letter-spacing:0.5px}
.color-options{display:flex;gap:10px}
.color-circle{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid #fff;outline:1px solid #ddd}
.color-circle.active{outline:2px solid #111}
.storage-options{display:flex;flex-wrap:wrap;gap:8px}
.storage-pill{font-size:12px;padding:8px 14px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;color:#111;font-weight:500}
.storage-pill.active{border-color:#111;background:#111;color:#fff}

/* Action Buttons */
.action-row{display:flex;gap:12px;margin-top:0.5rem}
.btn-main-add{flex:1;background:#111;color:#fff;border:none;padding:14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main-add:hover{background:#333}
.btn-wish{background:#fff;border:1px solid #ddd;color:#666;width:48px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.btn-wish:hover{background:#f5f5f5;color:#111}

/* Accordion Layout */
.accordion{border-top:1px solid #e8e8e8;margin-top:1rem}
.acc-item{border-bottom:1px solid #e8e8e8}
.acc-trigger{width:100%;padding:14px 0;background:none;border:none;text-align:left;font-size:13px;font-weight:600;color:#111;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.acc-content{max-height:0;overflow:hidden;transition:max-height 0.2s ease-out;font-size:13px;color:#666;line-height:1.6;padding-bottom:0}
.acc-item.open .acc-content{max-height:300px;padding-bottom:14px}
.acc-trigger i{transition:transform 0.2s}
.acc-item.open .acc-trigger i{transform:rotate(180deg)}

/* Sidebar Cart */
.cart-panel{position:fixed;top:0;right:-400px;width:360px;height:100%;background:#fff;border-left:1px solid #e8e8e8;transition:right 0.25s ease;z-index:200;display:flex;flex-direction:column}
.cart-panel.open{right:0}
.cart-head{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.cart-head h3{font-size:16px;font-weight:600}
.cart-close{background:none;border:none;cursor:pointer;color:#888;font-size:20px}
.cart-body{flex:1;overflow-y:auto;padding:16px 24px}
.cart-empty{text-align:center;padding:3rem 0;color:#aaa;font-size:14px}
.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #f5f5f5;align-items:center}
.cart-item-img{width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid #eee;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:600;color:#111;margin-bottom:3px}
.cart-item-variant{font-size:11px;color:#999;margin-bottom:2px}
.cart-item-price{font-size:13px;color:#666}
.cart-item-remove{background:none;border:none;color:#bbb;cursor:pointer;font-size:16px;padding:4px}
.cart-item-remove:hover{color:#ef4444}
.cart-foot{padding:20px 24px;border-top:1px solid #f0f0f0}
.cart-row{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:8px}
.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:600;color:#111;margin-bottom:16px;padding-top:8px;border-top:1px solid #f0f0f0}
.btn-checkout{width:100%;background:#111;color:#fff;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:190;display:none}
.overlay.open{display:block}
.footer{text-align:center;padding:2.5rem;font-size:13px;color:#aaa;border-top:1px solid #e8e8e8;margin-top:3rem;background:#fff}

@media(max-width: 992px) {
  .catalog-layout{grid-template-columns:1fr}
  .sidebar-nav{position:static;width:100%}
  .prod-container{grid-template-columns:1fr}
}
</style>

}

  // Render Star System
  const starNodeBox = document.getElementById('prodStars');
  starNodeBox.innerHTML = '';
  const solidStars = Math.floor(currentItem.rating);
  for(let i=0; i<5; i++) {
    if(i < solidStars) {
      starNodeBox.innerHTML += `<i class="ti ti-star-filled"></i>`;
    } else if(i === solidStars && currentItem.rating % 1 !== 0) {
      starNodeBox.innerHTML += `<i class="ti ti-star-half-filled"></i>`;
    } else {
      starNodeBox.innerHTML += `<i class="ti ti-star"></i>`;
    }
  }

  // Load Primary Media Asset Gallery
  document.getElementById('mainProductImg').src = currentItem.images[0];
  const thumbRow = document.getElementById('thumbRow');
  thumbRow.innerHTML = currentItem.images.map((url, index) => `
    <div class="thumb ${index === 0 ? 'active' : ''}" onclick="changeImage('${url}', this)">
      <img src="${url}" alt="Thumbnail image tracking ID ${index}">
    </div>
  `).join('');

  // Assemble Selection Matrix Controls
  const variantArea = document.getElementById('dynamicVariantsContainer');
  variantArea.innerHTML = `
    <div class="selector-group" style="margin-bottom:1rem;">
      <span class="selector-label">${currentItem.variants.label}</span>
      <div class="storage-options">
        ${currentItem.variants.options.map((opt, idx) => `
          <span class="storage-pill ${idx === selectedVariantIndex ? 'active' : ''}" onclick="selectVariantConfig(${idx})">
            ${opt.name}
          </span>
        `).join('')}
      </div>
    </div>
    <div class="selector-group" style="margin-bottom:1.5rem;">
      <span class="selector-label">COLOR SPECIFICATION</span>
      <div class="color-options">
        ${currentItem.variants.colors.map((color, idx) => `
          <div class="color-circle ${idx === selectedColorIndex ? 'active' : ''}" style="background:${color}" onclick="selectColorConfig(${idx})"></div>
        `).join('')}
      </div>
    </div>
  `;

  calculateCurrentPriceDisplay();
}

function switchActiveCatalogItem(productKey) {
  activeKey = productKey;
  selectedVariantIndex = 0;
  selectedColorIndex = 0;
  
  document.querySelectorAll('.prod-menu-item').forEach((node, idx) => {
    node.classList.remove('active');
    if(Object.keys(productsDataset)[idx] === productKey) {
      node.classList.add('active');
    }
  });

  renderActiveProductView();
}

function changeImage(imgUrl, element) {
  document.getElementById('mainProductImg').src = imgUrl;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  element.classList.add('active');
}

function selectVariantConfig(index) {
  selectedVariantIndex = index;
  document.querySelectorAll('.storage-pill').forEach((pill, idx) => {
    pill.classList.toggle('active', idx === index);
  });
  calculateCurrentPriceDisplay();
}

function selectColorConfig(index) {
  selectedColorIndex = index;
  document.querySelectorAll('.color-circle').forEach((circle, idx) => {
    circle.classList.toggle('active', idx === index);
  });
}

function calculateCurrentPriceDisplay() {
  const product = productsDataset[activeKey];
  const activePrice = product.basePrice + product.variants.options[selectedVariantIndex].priceDelta;
  document.getElementById('prodPrice').textContent = fmtPrice(activePrice);
}

function toggleAccordion(element) {
  element.parentElement.classList.toggle('open');
}

function toggleWishlist(btn) {
  const icon = btn.querySelector('i');
  icon.classList.toggle('ti-heart');
  icon.classList.toggle('ti-heart-filled');
}

// Shopping Cart Core Functions
function triggerAddToCart(){
  const product = productsDataset[activeKey];
  const finalPrice = product.basePrice + product.variants.options[selectedVariantIndex].priceDelta;
  const chosenVariantName = product.variants.options[selectedVariantIndex].name;
  
  globalCartItems.push({
    name: product.name,
    variant: chosenVariantName,
    price: finalPrice,
    image: product.images[0]
  });

  refreshCartState();
  toggleCart();
}

function dropCartItem(itemIndex){
  globalCartItems.splice(itemIndex, 1);
  refreshCartState();
}

function refreshCartState(){
  const summaryTotal = globalCartItems.reduce((acc, obj) => acc + obj.price, 0);
  document.getElementById('cartCount').textContent = globalCartItems.length;
  document.getElementById('subtotal').textContent = fmtPrice(summaryTotal);
  document.getElementById('totalAmt').textContent = fmtPrice(summaryTotal);
  
  const targetBody = document.getElementById('cartBody');
  const targetFoot = document.getElementById('cartFoot');
  
  if(globalCartItems.length === 0){
    targetBody.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
    targetFoot.style.display = 'none';
  } else {
    targetBody.innerHTML = globalCartItems.map((item, idx) => `
      <div class="cart-item">
        <img class="cart-item-img" src="${item.image}" alt="${item.name}">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-variant">${item.variant}</div>
          <div class="cart-item-price">${fmtPrice(item.price)}</div>
        </div>
        <button class="cart-item-remove" onclick="dropCartItem(${idx})">✕</button>
      </div>
    `).join('');
    targetFoot.style.display = 'block';
  }
}

function toggleCart(){
  document.getElementById('cartPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function closeCart(){
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// Runtime Setup Lifecycle Initialization Calls
window.addEventListener('DOMContentLoaded', () => {
  initializeCatalogMenu();
  renderActiveProductView();
});
</script>
</body>
</html>
