<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections - MyShop</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4;color:#111}

/* Header Styles matching index.html */
.hdr{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;height:64px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.hdr-logo{font-size:20px;font-weight:700;letter-spacing:3px;color:#111;text-decoration:none}
.hdr-logo span{font-weight:400;color:#888}
.hdr-nav{display:flex;gap:2rem;align-items:center}
.hdr-link{font-size:13px;color:#666;cursor:pointer;letter-spacing:0.5px;text-decoration:none}
.hdr-link:hover,.hdr-link.active{color:#111}
.hdr-actions{display:flex;gap:10px;align-items:center}
.cart-chip{display:flex;align-items:center;gap:6px;background:#f5f5f5;border:1px solid #e8e8e8;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;color:#111}
.cart-count{background:#111;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* Elegant Page Layout Container */
.main-layout{max-width:1300px;margin:2rem auto;padding:0 2rem;display:grid;grid-template-columns:240px 1fr;gap:2.5rem;align-items:start}

/* Left Column: Sticky Fast Filtering Navigation Sidebar */
.filter-sidebar{position:sticky;top:90px;background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.5rem}
.sidebar-title{font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#111;margin-bottom:1rem;border-bottom:1px solid #eee;padding-bottom:8px}
.filter-menu{display:flex;flex-direction:column;gap:6px;list-style:none}
.filter-btn{width:100%;text-align:left;background:none;border:none;padding:10px 12px;font-size:13px;color:#666;border-radius:6px;cursor:pointer;display:flex;justify-content:between;align-items:center;transition:all 0.15s}
.filter-btn:hover{background:#f5f5f5;color:#111}
.filter-btn.active{background:#111;color:#fff;font-weight:600}
.filter-btn span{font-size:11px;background:#eee;color:#666;padding:2px 6px;border-radius:10px}
.filter-btn.active span{background:rgba(255,255,255,0.2);color:#fff}

/* Right Column: Multi-Category Stack View */
.content-stack{display:flex;flex-direction:column;gap:3.5rem}
.coll-section{scroll-margin-top:90px}
.section-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #e8e8e8;padding-bottom:10px;margin-bottom:1.5rem}
.section-title{font-size:20px;font-weight:700;color:#111;letter-spacing:-0.3px}
.section-count{font-size:13px;color:#888}

/* Product Cards Row Layout */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:1.5rem}
.product-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;position:relative;display:flex;flex-direction:column;transition:transform 0.2s, box-shadow 0.2s}
.product-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.06)}
.img-box{width:100%;height:180px;background:#f9f9f9;overflow:hidden;position:relative}
.img-box img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
.product-card:hover .img-box img{transform:scale(1.03)}

/* Interactive Fast Buy Hover Button Overlay */
.fast-add-btn{position:absolute;bottom:12px;right:12px;background:#fff;color:#111;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);opacity:0;transform:translateY(8px);transition:all 0.2s}
.product-card:hover .fast-add-btn{opacity:1;transform:translateY(0)}
.fast-add-btn:hover{background:#111;color:#fff}

.card-info{padding:14px;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:8px}
.item-name{font-size:13px;font-weight:600;color:#111;line-height:1.4}
.item-price{font-size:14px;font-weight:700;color:#111}

/* Slide-out Shopping Cart Framework */
.cart-panel{position:fixed;top:0;right:-400px;width:360px;height:100%;background:#fff;border-left:1px solid #e8e8e8;transition:right 0.25s ease;z-index:200;display:flex;flex-direction:column}
.cart-panel.open{right:0}
.cart-head{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.cart-head h3{font-size:16px;font-weight:600}
.cart-close{background:none;border:none;cursor:pointer;color:#888;font-size:20px}
.cart-body{flex:1;overflow-y:auto;padding:16px 24px}
.cart-empty{text-align:center;padding:3rem 0;color:#aaa;font-size:14px}
.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #f5f5f5}
.cart-item-img{width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid #eee;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:600;color:#111;margin-bottom:3px}
.cart-item-price{font-size:13px;color:#888}
.cart-item-remove{background:none;border:none;color:#bbb;cursor:pointer;font-size:16px;align-self:flex-start}
.cart-foot{padding:20px 24px;border-top:1px solid #f0f0f0}
.cart-row{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:8px}
.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:600;color:#111;margin-bottom:16px;padding-top:8px;border-top:1px solid #f0f0f0}
.btn-checkout{width:100%;background:#111;color:#fff;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.15);z-index:190;display:none}
.overlay.open{display:block}
.footer{text-align:center;padding:2.5rem;font-size:13px;color:#aaa;border-top:1px solid #e8e8e8;margin-top:4rem;background:#fff}

@media(max-width: 768px){
  .main-layout{grid-template-columns:1fr}
  .filter-sidebar{position:static;margin-bottom:1rem}
}
</style>
</head>
<body>

<header class="hdr">
  <a class="hdr-logo" href="myshop.html">MY<span>SHOP</span></a>
  <nav class="hdr-nav">
    <a class="hdr-link" href="product.html">Products</a>
    <a class="hdr-link active" href="Collections.html">Collections</a>
    <a class="hdr-link" href="about.html">About</a>
  </nav>
  <div class="hdr-actions">
    <div class="cart-chip" onclick="toggleCart()">
      <i class="ti ti-shopping-bag"></i> Cart <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</header>

<main class="main-layout">
  <aside class="filter-sidebar">
    <div class="sidebar-title">Categories</div>
    <div class="filter-menu" id="sidebarMenu">
      </div>
  </aside>

  <section class="content-stack" id="collectionsStack">
    </section>
</main>

<footer class="footer">© 2025 MyShop. All rights reserved.</footer>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="cart-panel" id="cartPanel">
  <div class="cart-head">
    <h3>Your cart</h3>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body" id="cartBody">
    <div class="cart-empty">Your cart is empty</div>
  </div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
    <div class="cart-row"><span>Shipping</span><span>Free</span></div>
    <div class="cart-total"><span>Total</span><span id="totalAmt">₹0</span></div>
    <button class="btn-checkout">Proceed to checkout →</button>
  </div>
</aside>

<script>
// Inventory dataset synchronized exactly with your backend definitions
const inventory = [
  {id:1,  name:"Smartphone",   cat:"Phones",      price:110000, image:"https://images.unsplash.com/photo-1546054454-aa26e2b734c7?w=600&h=450&fit=crop"},
  {id:2,  name:"Laptop",       cat:"Computers",   price:49999,  image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&h=300&fit=crop"},
  {id:3,  name:"Headphones",   cat:"Audio",       price:2999,   image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=300&fit=crop"},
  {id:4,  name:"Smart Watch",  cat:"Wearables",   price:3999,   image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop"},
  {id:5,  name:"Charger",      cat:"Accessories", price:800,    image:"https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400&h=300&fit=crop"},
  {id:6,  name:"Power Bank",   cat:"Accessories", price:1999,   image:"https://images.unsplash.com/photo-1609091839311-d5365f9ff1c5?w=400&h=300&fit=crop"},
  {id:7,  name:"Laptop Stand", cat:"Accessories", price:600,    image:"download.webp"},
  {id:8,  name:"Mouse",        cat:"Accessories", price:400,    image:"https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400&h=300&fit=crop"},
  {id:9,  name:"AC",           cat:"Home",        price:35000,  image:"download (3).jpg"},
  {id:10, name:"Hair Dryer",   cat:"Home",        price:3999,   image:"shubham-dhage-O4rT7zAi4ro-unsplash.jpg"},
  {id:11, name:"Speaker",      cat:"Audio",       price:5999,   image:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&h=300&fit=crop"},
  {id:12, name:"Keyboard",     cat:"Computers",   price:900,    image:"https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&h=300&fit=crop"},
  {id:13, name:"CPU",          cat:"Computers",   price:20000,  image:"https://images.unsplash.com/photo-1547082299-de196ea013d6?w=400&h=300&fit=crop"},
  {id:14, name:"GPU",          cat:"Computers",   price:399999, image:"https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400&h=300&fit=crop"},
  {id:15, name:"TV",           cat:"Home",        price:199999, image:"https://images.unsplash.com/photo-1461151304267-38535e780c79?w=400&h=300&fit=crop"}
];

let globalCart = [];

function formatPriceINR(n){ return '₹' + n.toLocaleString('en-IN'); }

// Fallback script if any local image file throws a loading error
function handleImgError(imageEl) {
  imageEl.src = "https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=400&h=300&fit=crop";
}

// Generate the sidebar links and simultaneous collection categories down the layout
function setupCollectionLayout() {
  // Extract distinct category tags present in array
  const categories = [...new Set(inventory.map(item => item.cat))];
  
  const sidebarContainer = document.getElementById('sidebarMenu');
  const contentContainer = document.getElementById('collectionsStack');
  
  // Create Left Sidebar Navigation buttons
  sidebarContainer.innerHTML = categories.map((cat, i) => `
    <button class="filter-btn ${i===0?'active':''}" onclick="scrollToCategory('${cat}', this)">
      ${cat} <span>${inventory.filter(item => item.cat === cat).length}</span>
    </button>
  `).join('');

  // Create Continuous Stack Rows for Right Side Column
  contentContainer.innerHTML = categories.map(cat => {
    const segmentedItems = inventory.filter(item => item.cat === cat);
    return `
      <div class="coll-section" id="sec-${cat}">
        <div class="section-header">
          <h2 class="section-title">${cat} Collection</h2>
          <span class="section-count">${segmentedItems.length} Products available</span>
        </div>
        <div class="product-grid">
          ${segmentedItems.map(p => `
            <div class="product-card">
              <div class="img-box">
                <img src="${p.image}" onerror="handleImgError(this)" alt="${p.name}">
                <button class="fast-add-btn" onclick="pushToCart(${p.id})" title="Add to Bag">
                  <i class="ti ti-plus"></i>
                </button>
              </div>
              <div class="card-info">
                <div class="item-name">${p.name}</div>
                <div class="item-price">${formatPriceINR(p.price)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// Smooth scroll implementation targeting section divisions
function scrollToCategory(catId, btnElement) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btnElement.classList.add('active');
  
  const targetElement = document.getElementById(`sec-${catId}`);
  if(targetElement) {
    targetElement.scrollIntoView({ behavior: 'smooth' });
  }
}

// Integrated Cart management rules
function pushToCart(id) {
  const match = inventory.find(p => p.id === id);
  if(match) {
    globalCart.push(match);
    renderCartView();
  }
}

function removeCartIndex(idx) {
  globalCart.splice(idx, 1);
  renderCartView();
}

function renderCartView() {
  const currentTotal = globalCart.reduce((acc, current) => acc + current.price, 0);
  document.getElementById('cartCount').textContent = globalCart.length;
  document.getElementById('subtotal').textContent = formatPriceINR(currentTotal);
  document.getElementById('totalAmt').textContent = formatPriceINR(currentTotal);
  
  const bodyElement = document.getElementById('cartBody');
  const footElement = document.getElementById('cartFoot');
  
  if(globalCart.length === 0) {
    bodyElement.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
    footElement.style.display = 'none';
  } else {
    bodyElement.innerHTML = globalCart.map((item, idx) => `
      <div class="cart-item">
        <img class="cart-item-img" src="${item.image}" onerror="handleImgError(this)" alt="${item.name}">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${formatPriceINR(item.price)}</div>
        </div>
        <button class="cart-item-remove" onclick="removeCartIndex(${idx})">✕</button>
      </div>
    `).join('');
    footElement.style.display = 'block';
  }
}

function toggleCart(){
  document.getElementById('cartPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeCart(){
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// Fire rendering assembly on page mount
setupCollectionLayout();
</script>
</body>
</html>
